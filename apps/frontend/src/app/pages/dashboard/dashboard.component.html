<div class="mb-8 flex justify-between items-end">
  <div>
    <h2 class="text-2xl font-bold text-[var(--color-text)]">Overview</h2>
    <p class="mt-1 text-sm text-[var(--color-text-secondary)]">
      Here's what's happening with your automations today, {{ today | date:'mediumDate' }}.
    </p>
  </div>
  <button class="btn-primary flex items-center gap-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    New Automation
  </button>
</div>

<!-- Stats Grid -->
<div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4 mb-8">
  <app-stats-card *ngFor="let stat of stats" [title]="stat.title" [value]="stat.value" [change]="stat.change" [iconPath]="stat.iconPath">
  </app-stats-card>
</div>

<!-- Bottom Section: Charts & Activity -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

  <!-- Left Side: Placeholder for Chart -->
  <div class="lg:col-span-2 card p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-[var(--color-text)]">Engagement Over Time</h3>
      <select
        class="border border-[var(--color-borders)] rounded-md text-sm p-1.5 focus:outline-none focus:ring-1 focus:ring-[var(--color-primary)]">
        <option>Last 7 days</option>
        <option>Last 30 days</option>
        <option>This Year</option>
      </select>
    </div>
    <div
      class="h-64 flex items-center justify-center border-2 border-dashed border-[var(--color-borders)] rounded-lg bg-gray-50">
      <p class="text-[var(--color-text-secondary)] flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        Chart Component Placeholder
      </p>
    </div>
  </div>

  <!-- Right Side: Recent Activity -->
  <div class="card p-6">
    <h3 class="text-lg font-semibold text-[var(--color-text)] mb-4">Recent Activity</h3>
    <div class="space-y-4">
      <ul role="list" class="-mb-8" *ngIf="recentActivity && recentActivity.length > 0; else emptyState">
        <li *ngFor="let activity of recentActivity; let last = last">
          <div class="relative pb-8">
            <span *ngIf="!last" class="absolute left-4 top-4 -ml-px h-full w-0.5 bg-[var(--color-borders)]" aria-hidden="true"></span>
            <div class="relative flex space-x-3">
              <div>
                <span [ngClass]="activity.type === 'comment' ? 'bg-blue-500' : activity.type === 'dm' ? 'bg-purple-500' : 'bg-gray-500'" class="h-8 w-8 rounded-full flex items-center justify-center ring-8 ring-white">
                  <svg class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 2c-2.236 0-4.43.18-6.57.524C1.993 2.755 1 4.014 1 5.426v5.148c0 1.413.993 2.67 2.43 2.902.848.137 1.705.248 2.57.331v3.443a.75.75 0 001.28.53l3.58-3.579a22.54 22.54 0 004.14-.4m-6.5-2.731l.02.022z" clip-rule="evenodd" />
                  </svg>
                </span>
              </div>
              <div class="flex min-w-0 flex-1 justify-between space-x-4 pt-1.5">
                <div>
                  <p class="text-sm text-[var(--color-text)]">{{ activity.rule }} <span class="text-[var(--color-text-secondary)]">on</span> <a href="#" class="font-medium text-[var(--color-primary)] hover:underline">{{ activity.account }}</a></p>
                </div>
                <div class="whitespace-nowrap text-right text-sm text-[var(--color-text-secondary)]">
                  <time [attr.datetime]="activity.time">{{ activity.time | date:'shortTime' }}</time>
                </div>
              </div>
            </div>
          </div>
        </li>
      </ul>
      <ng-template #emptyState>
        <p class="text-sm text-[var(--color-text-muted)] text-center py-4">No recent activity found.</p>
      </ng-template>
    </div>
  </div>

</div>
