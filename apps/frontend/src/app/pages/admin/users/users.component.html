<div class="mb-8 flex justify-between items-end">
  <div>
    <h2 class="text-2xl font-bold">Tenant Management</h2>
    <p class="text-gray-400 mt-1">Manage all registered users and their subscriptions.</p>
  </div>
</div>

<div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-700">
      <thead class="bg-gray-900/50">
        <tr>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Tenant</th>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Plan</th>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Status</th>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Joined</th>
          <th scope="col" class="relative px-6 py-3"><span class="sr-only">Actions</span></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-700">
        @for (user of users; track user.id) {
          <tr class="hover:bg-gray-700/50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-white">{{ user.name }}</div>
              <div class="text-sm text-gray-400">{{ user.email }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-700 text-gray-300">
                {{ user.plan }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span [ngClass]="user.status === 'Active' ? 'text-green-400 bg-green-400/10' : 'text-red-400 bg-red-400/10'" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full">
                {{ user.status }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400">
              {{ user.joined }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button class="text-indigo-400 hover:text-indigo-300">Manage</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
