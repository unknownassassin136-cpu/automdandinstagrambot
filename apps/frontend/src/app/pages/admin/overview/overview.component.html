<div class="mb-8">
  <h2 class="text-2xl font-bold">Platform Overview</h2>
  <p class="text-gray-400 mt-1">High-level metrics for the entire SaaS platform.</p>
</div>

<!-- Key Metrics -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
  @for (stat of platformStats; track stat.label) {
    <div class="bg-gray-800 border border-gray-700 rounded-xl p-6">
      <p class="text-sm font-medium text-gray-400">{{ stat.label }}</p>
      <div class="mt-2 flex items-baseline gap-2">
        <p class="text-3xl font-bold text-white">{{ stat.value }}</p>
        <span class="text-sm font-medium text-green-400">{{ stat.trend }}</span>
      </div>
    </div>
  }
</div>

<!-- System Health -->
<div class="bg-gray-800 border border-gray-700 rounded-xl p-6">
  <h3 class="text-lg font-semibold text-white mb-4">System Health</h3>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
    
    <div class="flex flex-col gap-1">
      <span class="text-sm text-gray-400">Database (PostgreSQL)</span>
      <span class="inline-flex items-center gap-1.5 text-sm font-medium text-green-400">
        <span class="w-2 h-2 rounded-full bg-green-400"></span> Healthy
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <span class="text-sm text-gray-400">Queue (Redis)</span>
      <span class="inline-flex items-center gap-1.5 text-sm font-medium text-green-400">
        <span class="w-2 h-2 rounded-full bg-green-400"></span> Healthy
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <span class="text-sm text-gray-400">Workers (BullMQ)</span>
      <span class="inline-flex items-center gap-1.5 text-sm font-medium text-green-400">
        <span class="w-2 h-2 rounded-full bg-green-400"></span> Healthy
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <span class="text-sm text-gray-400">Meta Webhooks API</span>
      <span class="inline-flex items-center gap-1.5 text-sm font-medium text-yellow-400">
        <span class="w-2 h-2 rounded-full bg-yellow-400"></span> Warning
      </span>
    </div>

  </div>
</div>
