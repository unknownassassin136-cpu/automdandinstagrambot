@if (!isSubmitted) {
  <form class="space-y-6" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div>
      <p class="text-sm text-[var(--color-text-secondary)] mb-4 text-center">
        Enter the email address associated with your account and we'll send you a link to reset your password.
      </p>
      <label for="email" class="block text-sm font-medium text-[var(--color-text)]">
        Email address
      </label>
      <div class="mt-1">
        <input id="email" type="email" formControlName="email" class="input-field" placeholder="you@company.com">
      </div>
    </div>

    <div>
      <button type="submit" [disabled]="!resetForm.valid" class="w-full flex justify-center btn-primary disabled:opacity-50">
        Send reset link
      </button>
    </div>
  </form>
} @else {
  <div class="text-center">
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
      <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <h3 class="text-lg font-medium text-[var(--color-text)]">Check your email</h3>
    <p class="mt-2 text-sm text-[var(--color-text-secondary)]">
      We've sent a password reset link to <span class="font-medium">{{ resetForm.value.email }}</span>.
    </p>
  </div>
}

<div class="mt-6 text-center">
  <p class="text-sm text-[var(--color-text-secondary)]">
    <a routerLink="/auth/login" class="font-medium text-[var(--color-primary)] hover:text-[var(--color-primary-hover)] flex items-center justify-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to login
    </a>
  </p>
</div>
