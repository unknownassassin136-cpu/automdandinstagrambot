<form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded-md text-sm mb-4">
    {{ error }}
  </div>

  <div>
    <label for="email" class="block text-sm font-medium text-[var(--color-text)]">
      Email address
    </label>
    <div class="mt-1">
      <input id="email" type="email" formControlName="email" class="input-field" placeholder="you@company.com">
    </div>
  </div>

  <div>
    <label for="password" class="block text-sm font-medium text-[var(--color-text)]">
      Password
    </label>
    <div class="mt-1">
      <input id="password" type="password" formControlName="password" class="input-field" placeholder="••••••••">
    </div>
  </div>

  <div class="flex items-center justify-between">
    <div class="flex items-center">
      <input id="remember-me" type="checkbox" class="h-4 w-4 text-[var(--color-primary)] focus:ring-[var(--color-primary)] border-gray-300 rounded">
      <label for="remember-me" class="ml-2 block text-sm text-[var(--color-text-secondary)]">
        Remember me
      </label>
    </div>

    <div class="text-sm">
      <a routerLink="/auth/reset-password" class="font-medium text-[var(--color-primary)] hover:text-[var(--color-primary-hover)]">
        Forgot your password?
      </a>
    </div>
  </div>

  <div>
    <button type="submit" [disabled]="!loginForm.valid || loading" class="w-full flex justify-center btn-primary disabled:opacity-50">
      <span *ngIf="loading">Signing in...</span>
      <span *ngIf="!loading">Sign in</span>
    </button>
  </div>
</form>

<div class="mt-6 text-center">
  <p class="text-sm text-[var(--color-text-secondary)]">
    Don't have an account?
    <a routerLink="/auth/register" class="font-medium text-[var(--color-primary)] hover:text-[var(--color-primary-hover)]">
      Start your free trial
    </a>
  </p>
</div>
