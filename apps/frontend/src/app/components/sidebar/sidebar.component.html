<aside class="w-64 bg-cards shadow-[10px_0_20px_rgba(163,177,198,0.2)] h-screen sticky top-0 flex flex-col hidden md:flex z-20">
  <!-- Logo Area -->
  <div class="h-20 flex items-center px-8 mb-4">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-xl bg-cards shadow-neu-flat flex items-center justify-center text-primary">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <span class="font-extrabold text-xl tracking-tight text-text">AutoMD</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-2 px-6 space-y-4 overflow-y-auto">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.route"
        routerLinkActive="shadow-neu-pressed text-primary font-bold"
        [routerLinkActiveOptions]="{exact: item.route === '/'}"
        class="flex items-center gap-4 px-4 py-3 rounded-2xl text-text/70 transition-all duration-300 hover:shadow-neu-flat hover:text-primary group"
      >
        <svg class="w-5 h-5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
        </svg>
        <span class="text-[15px]">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Bottom Area (e.g. Plan Usage) -->
  <div class="p-6" *ngIf="billingStatus">
    <div class="bg-cards shadow-neu-pressed rounded-2xl p-5">
      <h4 class="text-xs font-bold text-text uppercase tracking-wider mb-3">{{ billingStatus.planName }}</h4>
      <div class="flex justify-between text-[11px] font-medium text-text/60 mb-2">
        <span>{{ billingStatus.maxAutomations === -1 ? 'Automations' : 'Usage' }}</span>
        <span *ngIf="billingStatus.maxAutomations !== -1">{{ usagePercent }}%</span>
        <span *ngIf="billingStatus.maxAutomations === -1">{{ totalAutomations }} Active</span>
      </div>
      <div class="w-full bg-cards shadow-neu-pressed rounded-full h-2" *ngIf="billingStatus.maxAutomations !== -1">
        <div class="bg-primary shadow-[0_0_10px_rgba(124,58,237,0.5)] h-2 rounded-full" [style.width.%]="usagePercent"></div>
      </div>
    </div>
  </div>
</aside>
