<aside class="w-64 bg-white border-r border-[var(--color-borders)] h-screen sticky top-0 flex flex-col hidden md:flex">
  <!-- Logo Area -->
  <div class="h-16 flex items-center px-6 border-b border-[var(--color-borders)]">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-[var(--color-primary)] flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <span class="font-bold text-lg text-[var(--color-text)]">AutoMD</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-6 px-4 space-y-1 overflow-y-auto">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-indigo-50 text-[var(--color-primary)] font-semibold"
        [routerLinkActiveOptions]="{exact: item.route === '/'}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[var(--color-text-secondary)] hover:bg-gray-50 hover:text-[var(--color-text)] transition-colors group"
      >
        <svg class="w-5 h-5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
        </svg>
        <span class="text-sm">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Bottom Area (e.g. Plan Usage) -->
  <div class="p-4 border-t border-[var(--color-borders)]" *ngIf="billingStatus">
    <div class="bg-[var(--color-background)] rounded-lg p-4">
      <h4 class="text-xs font-semibold text-[var(--color-text)] uppercase tracking-wider mb-2">{{ billingStatus.planName }}</h4>
      <div class="flex justify-between text-xs text-[var(--color-text-secondary)] mb-1">
        <span>{{ billingStatus.maxAutomations === -1 ? 'Automations' : 'Usage' }}</span>
        <span *ngIf="billingStatus.maxAutomations !== -1">{{ usagePercent }}%</span>
        <span *ngIf="billingStatus.maxAutomations === -1">{{ totalAutomations }} Active</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-1.5" *ngIf="billingStatus.maxAutomations !== -1">
        <div class="bg-[var(--color-primary)] h-1.5 rounded-full" [style.width.%]="usagePercent"></div>
      </div>
    </div>
  </div>
</aside>
