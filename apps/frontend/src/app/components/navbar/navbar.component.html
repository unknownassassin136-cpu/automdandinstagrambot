<header class="bg-white border-b border-[var(--color-borders)] h-16 flex items-center justify-between px-6 sticky top-0 z-10">
  <div class="flex items-center">
    <h1 class="text-xl font-bold text-[var(--color-text)] hidden md:block">Dashboard</h1>
  </div>
  
  <div class="flex items-center gap-4">
    <!-- Notifications -->
    <button class="p-2 text-[var(--color-text-secondary)] hover:text-[var(--color-text)] transition-colors relative">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-[var(--color-danger)] rounded-full"></span>
    </button>

    <!-- Profile Dropdown -->
    <div class="relative">
      <div (click)="toggleMenu()" class="flex items-center gap-2 cursor-pointer p-1 rounded-lg hover:bg-gray-50 transition-colors">
        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm">
          A
        </div>
        <span class="text-sm font-medium text-[var(--color-text)] hidden sm:block">Admin</span>
        <svg class="w-4 h-4 text-[var(--color-text-secondary)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>

      <!-- Dropdown Menu -->
      <div *ngIf="isMenuOpen" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 border border-gray-200 z-50">
        <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Your Profile</a>
        <a href="/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Settings</a>
        <button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Sign out</button>
      </div>
    </div>
  </div>
</header>
