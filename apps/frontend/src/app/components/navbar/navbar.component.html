<header class="bg-cards shadow-neu-sm h-16 flex items-center justify-between px-6 sticky top-0 z-10">
  <div class="flex items-center">
    <h1 class="text-xl font-bold text-[var(--color-text)] hidden md:block">Dashboard</h1>
  </div>
  
  <div class="flex items-center gap-4">
    <!-- Theme Toggle -->
    <button (click)="themeService.toggleTheme()" class="p-2.5 rounded-full text-text/70 hover:text-primary shadow-neu-flat hover:shadow-neu-pressed transition-all duration-300">
      <!-- Sun Icon (shows in dark mode) -->
      <svg *ngIf="themeService.isDarkMode()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <!-- Moon Icon (shows in light mode) -->
      <svg *ngIf="!themeService.isDarkMode()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>

    <!-- Notifications -->
    <button class="p-2.5 rounded-full text-text/70 hover:text-text shadow-neu-flat hover:shadow-neu-pressed transition-all duration-300 relative">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <span class="absolute top-2 right-2 w-2 h-2 bg-danger rounded-full shadow-[0_0_5px_rgba(239,68,68,0.8)]"></span>
    </button>

    <!-- Profile Dropdown -->
    <div class="relative ml-2">
      <div (click)="toggleMenu()" class="flex items-center gap-3 cursor-pointer p-1.5 pl-3 rounded-2xl hover:shadow-neu-pressed transition-all duration-300">
        <span class="text-sm font-bold text-text hidden sm:block">Admin</span>
        <div class="w-9 h-9 rounded-xl bg-cards shadow-neu-flat flex items-center justify-center text-primary font-bold text-sm">
          A
        </div>
        <svg class="w-4 h-4 text-text/60 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>

      <!-- Dropdown Menu -->
      <div *ngIf="isMenuOpen" class="absolute right-0 mt-3 w-48 bg-cards rounded-2xl shadow-neu-flat py-2 z-50">
        <a href="#" class="block px-5 py-2.5 text-[15px] font-medium text-text/80 hover:text-primary hover:bg-black/5">Your Profile</a>
        <a routerLink="/settings" class="block px-5 py-2.5 text-[15px] font-medium text-text/80 hover:text-primary hover:bg-black/5">Settings</a>
        <button (click)="logout()" class="block w-full text-left px-5 py-2.5 text-[15px] font-bold text-danger hover:bg-danger/10">Sign out</button>
      </div>
    </div>
  </div>
</header>
