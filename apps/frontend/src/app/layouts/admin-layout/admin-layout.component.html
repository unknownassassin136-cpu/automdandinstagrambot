<div class="min-h-screen bg-gray-900 text-white flex">
  <!-- Admin Sidebar (Dark Theme) -->
  <aside class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-red-600 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <span class="font-bold text-lg">Admin Center</span>
      </div>
    </div>

    <nav class="flex-1 py-6 px-4 space-y-1">
      @for (item of adminMenu; track item.label) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-gray-800 text-white font-semibold"
          [routerLinkActiveOptions]="{exact: item.route === '/admin'}"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors"
        >
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
    
    <div class="p-4 border-t border-gray-800">
      <a routerLink="/" class="flex items-center justify-center gap-2 w-full px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm transition-colors text-gray-300 hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to App
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col">
    <header class="h-16 border-b border-gray-800 flex items-center justify-between px-6">
      <h1 class="text-xl font-bold">Admin Console</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
